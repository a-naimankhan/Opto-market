services:
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "4200:80"
    networks:
      - optomarket-network

  server:
    build:
      context: ./Server/optomarket_back
      dockerfile: Dockerfile
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,server}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
    ports:
      - "8000:8000"
    networks:
      - optomarket-network
    volumes:
      - ./Server/optomarket_back:/app
      - ./Server/optomarket_back/media:/app/media
      - ./Server/optomarket_back/static:/app/static

networks:
  optomarket-network:
    driver: bridge
