<div class="seller-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🛒</span>
      <span class="brand-name">OptoMarket</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/seller/products" routerLinkActive="active">
        <span class="nav-icon">📦</span> Товары
      </a>
      <a class="nav-item" routerLink="/seller/categories" routerLinkActive="active">
        <span class="nav-icon">🗂️</span> Категории
      </a>
      <a class="nav-item" routerLink="/seller/order" routerLinkActive="active">
        <span class="nav-icon">📋</span> Заказы
      </a>
      <a class="nav-item" routerLink="/seller/customer" routerLinkActive="active">
        <span class="nav-icon">👥</span> Покупатели
      </a>
    </nav>

    <button class="logout-btn" (click)="logout()">
      <span>🚪</span> Выйти
    </button>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <h1 class="page-title">Панель продавца</h1>
      <button class="chat-navbar-btn" type="button" (click)="openCustomerChats()">
        💬 Чаты
        <span class="chat-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
