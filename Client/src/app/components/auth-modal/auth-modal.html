<div class="auth-modal-overlay" *ngIf="isOpen" (click)="close()">
  <div class="auth-modal-card" (click)="$event.stopPropagation()">
    <button type="button" class="close-btn" aria-label="Close" (click)="close()">x</button>

    <form *ngIf="!isRegister" class="auth-form">
      <h3>Вход</h3>

      <label for="username">Username</label>
      <input type="text" name="username" [(ngModel)]="loginObj.username" placeholder="Username" id="username" />

      <label for="password">Password</label>
      <input type="password" name="password" [(ngModel)]="loginObj.password" placeholder="Password" id="password" />

      <button type="button" class="submit-btn" (click)="onLogin()">Войти</button>
      <button type="button" class="switch-btn" (click)="isRegister = !isRegister">Нет аккаунта? Регистрация</button>
    </form>

    <form *ngIf="isRegister" class="auth-form">
      <h3>Регистрация</h3>

      <label for="register-username">Username</label>
      <input
        type="text"
        name="registerUsername"
        [(ngModel)]="registerObj.username"
        placeholder="Username"
        id="register-username"
      />

      <label for="register-email">Email</label>
      <input type="email" name="registerEmail" [(ngModel)]="registerObj.email" placeholder="Email" id="register-email" />

      <label for="register-password">Password</label>
      <input
        type="password"
        name="registerPassword"
        [(ngModel)]="registerObj.password"
        placeholder="Password"
        id="register-password"
      />

      <label for="register-password2">Repeat password</label>
      <input
        type="password"
        name="registerPassword2"
        [(ngModel)]="registerObj.password2"
        placeholder="Repeat password"
        id="register-password2"
      />

      <label for="register-role">Role</label>
      <select id="register-role" name="registerRole" [(ngModel)]="registerObj.role">
        <option value="buyer">Buyer</option>
        <option value="seller">Seller</option>
      </select>

      <button type="button" class="submit-btn" (click)="onRegister()">Создать аккаунт</button>
      <button type="button" class="switch-btn" (click)="isRegister = !isRegister">Уже есть аккаунт? Войти</button>
    </form>
  </div>
</div>
