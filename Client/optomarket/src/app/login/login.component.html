<div class="login-box">
  <h2>Авторизация OptoMarket</h2>
  
  <form #f="ngForm">
    <input type="text" [(ngModel)]="user.username" name="username" placeholder="Логин" required>
    <input type="password" [(ngModel)]="user.password" name="password" placeholder="Пароль" required>
    
    <button type="button" (click)="login()">Войти</button>
  </form>
</div>
