<div class="register-box">
  <h2>Регистрация в OptoMarket</h2>

  <div class="role-selection">
    <button
      type="button"
      [class.active]="user.role === 'buyer'"
      (click)="user.role = 'buyer'"
    >
      Покупатель
    </button>
    <button
      type="button"
      [class.active]="user.role === 'seller'"
      (click)="user.role = 'seller'"
    >
      Продавец
    </button>
  </div>

  <form #f="ngForm" (ngSubmit)="register()">
    <input type="text" [(ngModel)]="user.username" name="username" placeholder="Логин" required>
    <input type="email" [(ngModel)]="user.email" name="email" placeholder="Email" required>
    <input type="password" [(ngModel)]="user.password" name="password" placeholder="Пароль" required>
    <input type="password" [(ngModel)]="user.password2" name="password2" placeholder="Повторите пароль" required>

    <button type="submit" [disabled]="!user.role || user.password !== user.password2">Зарегистрироваться</button>
  </form>

  <p>Уже есть аккаунт? <a routerLink="/login">Войти</a></p>
</div>
